<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chiara-speech2text — Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    rel="stylesheet" />

  <link rel="stylesheet" href="/static/main.css" />
  <link rel="stylesheet" href="/static/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: Inter, system-ui, Arial, sans-serif;
      background: var(--bg, #0b1220);
      color: var(--fg, #e6eef8);
    }

    .grid {
      display: flex;
      gap: 2rem;
    }

    .tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 160px;
      height: 160px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.03);
      text-decoration: none;
      color: inherit;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
    }

    .tile .icon {
      font-size: 48px;
      margin-bottom: 0.5rem;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .subtitle {
      font-size: 0.85rem;
      opacity: 0.8
    }
  </style>
</head>

<body>
  <!-- Username -->
  <!-- <div class="username-container" style="position: fixed; top: 1.5rem; right: 1.5rem; width: auto; margin: 0; margin-top: 0;">
    <label for="username-input" style="margin: 0;">Username</label>
    <input type="text" id="username-input" class="setting-input" placeholder="chiara" value="chiara" style="width: 120px;">
    <button id="info-btn" class="info-button" title="Info" style="cursor: pointer;">
      <span class="material-symbols-outlined" style="color: var(--primary-color);">info</span>
    </button>
  </div> -->

  <!-- Username Info Modal -->
  <!-- <div id="username-info-modal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" aria-label="Close">&times;</button>
      <h2>Username Info</h2>
      <div style="padding: 0 1rem; line-height: 1.6;">
        <p>"username" is used to tag data, using format: <strong>YYYYMMDD_username</strong></p>
      </div>
    </div>

  <main>
    <div style="text-align:center; margin-bottom:2rem;">
      <h1 style="margin:0 0 0.25rem 0;">chiara-speech2text</h1>
      <div class="subtitle">Frontend</div>
    </div>

    <div class="grid">
      <a class="tile" href="/recorder" title="Record Audio">
        <span class="material-symbols-outlined icon">mic</span>
        <div class="title">Record</div>
        <!-- <div class="subtitle">Record data</div> -->
      </a>

      <a class="tile" href="/explorer" title="Open Explorer">
        <span class="material-symbols-outlined icon">folder_open</span>
        <div class="title">Explore</div>
        <!-- <div class="subtitle">Explore and edit data</div> -->
      </a>
    </div>
  </main>

  <script>
    // Handle username info modal
    const infoBtn = document.getElementById('info-btn');
    const modal = document.getElementById('username-info-modal');
    const closeBtn = modal.querySelector('.modal-close');

    infoBtn.addEventListener('click', () => {
      modal.style.display = 'flex';
    });

    closeBtn.addEventListener('click', () => {
      modal.style.display = 'none';
    });

    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        modal.style.display = 'none';
      }
    });

    // Save username to localStorage when changed
    const usernameInput = document.getElementById('username-input');
    usernameInput.addEventListener('change', () => {
      localStorage.setItem('username', usernameInput.value);
    });

    // Load username from localStorage on page load
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('username');
      if (saved) {
        usernameInput.value = saved;
      }
    });
  </script>
</body>

</html>
